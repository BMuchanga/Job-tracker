<link rel="stylesheet" href="form.css">

<form action="#" method="post">
    <label for="job-title">Job Title:</label>
    <input type="text" id="job-title" name="job-title" required>

    <label for="company">Company:</label>
    <input type="text" id="company" name="company" required>

    <label for="application-date">Application Date:</label>
    <input type="date" id="application-date" name="application-date" required>

    <label for="status">Status:</label>
    <input type="radio"  name="status" value="on">Applied
    <input type="radio"  name="status" value="on">Responded
    <input type="radio"  name="status" value="on">Accepted
    
    <button type="submit">Add Job</button>
</form>
