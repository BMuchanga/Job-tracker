<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Job Tracker</title>
</head>
<body>
    <div id="heading">
        <h1>JOB APPLICATION TRACKER</h1>
    </div>

    <div id="status">

       <div id="status-heading">
        <h2>Application status</h2>
       </div>

       <div id="option1">
        <h3>Applied</h3>
       </div>

       <div id="option2">
        <h3>Responded</h3>
       </div>

       <div id="option3">
        <h3>Accepted</h3>
       </div>  

       <div id="option4">
        <button id="add">Add job</button>
       </div>

    </div>

    <div id="footer">
        <h2>Application sites</h2>

      <div id="sites">

        <div class="site1">
            <h3>LinkedIn</h3>
        </div>

        <div class="site1">
            <h3>PSCIMS</h3>
        </div>

      </div>
    </div>
</body>
</html>
